<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>__TITLE__</title>
  <style>
    :root {
      --paper: #f7f3ec;
      --board: rgba(255, 252, 247, 0.96);
      --ink: #2f312d;
      --muted: #767a73;
      --line: #d8d1c5;
      --line-strong: #bca986;
      --frame: #e6dfd3;
      --shadow: 0 18px 46px rgba(47, 49, 45, 0.08);
      --sans: "Segoe UI", "PingFang SC", "Microsoft YaHei UI", sans-serif;
      --serif: "Georgia", "Times New Roman", "Noto Serif SC", serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 255, 255, 0.7), transparent 22%),
        linear-gradient(180deg, #f8f5ef 0%, #f1ece3 100%);
      color: var(--ink);
      font-family: var(--sans);
    }

    body { padding: 22px; }

    .page {
      max-width: 1880px;
      margin: 0 auto;
      border-radius: 28px;
      border: 1px solid var(--frame);
      background: var(--board);
      box-shadow: var(--shadow);
      padding: 22px 22px 14px;
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(32px, 3vw, 46px);
      line-height: 1.08;
      font-weight: 700;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .board {
      position: relative;
      margin-top: 10px;
      border-radius: 24px;
      border: 1px solid #e8e1d5;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.66)),
        repeating-linear-gradient(
          90deg,
          transparent 0,
          transparent 115px,
          rgba(216, 209, 197, 0.12) 115px,
          rgba(216, 209, 197, 0.12) 116px
        );
      overflow-x: auto;
      overflow-y: hidden;
      padding: 14px 14px 8px;
    }

    .board svg {
      display: block;
      width: 1880px;
      height: auto;
    }

    @media (max-width: 960px) {
      body { padding: 12px; }

      .page {
        padding: 18px;
        border-radius: 20px;
      }

      .meta { display: block; }

      .meta span + span {
        display: block;
        margin-top: 4px;
      }
    }
  </style>
</head>
<body>
  <section class="page">
    <p class="eyebrow">Skill Breakdown · Process Flow</p>
    <h1>__TITLE__</h1>
    <div class="meta">
      <span>__META_LEFT__</span>
      <span>__META_RIGHT__</span>
    </div>
    <div class="board">
      <svg id="flowSvg" viewBox="0 0 __VIEW_W__ __VIEW_H__" aria-label="__TITLE__"></svg>
    </div>
  </section>

  <script>
    (function () {
      const SVG_NS = "http://www.w3.org/2000/svg";
      const svg = document.getElementById("flowSvg");
      const model = __MODEL_JSON__;

      function svgEl(name, attrs) {
        const node = document.createElementNS(SVG_NS, name);
        Object.keys(attrs || {}).forEach((key) => node.setAttribute(key, attrs[key]));
        return node;
      }

      function addText(parent, lines, x, y, attrs, lineHeight) {
        const text = svgEl("text", attrs);
        lines.forEach((line, index) => {
          const tspan = svgEl("tspan", { x, y: y + index * lineHeight });
          tspan.textContent = line;
          text.appendChild(tspan);
        });
        parent.appendChild(text);
      }

      function tokenize(text) {
        return text.match(/[A-Za-z0-9._/-]+|[^\s]/g) || [];
      }

      function wrapTextKeepTokens(text, maxChars) {
        const tokens = tokenize(text);
        const lines = [];
        let line = "";

        tokens.forEach((token) => {
          const next = line + token;
          if (line && next.length > maxChars) {
            lines.push(line);
            line = token;
          } else {
            line = next;
          }
        });

        if (line) lines.push(line);
        return lines;
      }

      function titleMaxChars(card) {
        return Math.max(16, Math.floor((card.w - 92) / 11));
      }

      function purposeMaxChars(card) {
        return Math.max(20, Math.floor((card.w - 84) / 8.5));
      }

      function metaMaxChars(card) {
        return Math.max(18, Math.floor((card.w - 112) / 8.4));
      }

      function tagWidth(text) {
        const units = Array.from(text || "").reduce((sum, char) => {
          if (/\s/.test(char)) return sum + 4;
          if (/[A-Za-z0-9/_-]/.test(char)) return sum + 6.5;
          return sum + 10.5;
        }, 0);
        return Math.max(88, Math.min(128, 24 + units));
      }

      function cardLayout(card) {
        const titleLines = wrapTextKeepTokens(card.title, titleMaxChars(card));
        const purposeText = card.purpose ? `目的：${card.purpose}` : "";
        const purposeLines = purposeText ? wrapTextKeepTokens(purposeText, purposeMaxChars(card)) : [];
        const sourceDirLines = wrapTextKeepTokens(card.source_dir, metaMaxChars(card));
        const titleY = card.y + 54;
        const titleBlockHeight = titleLines.length * 20;
        const purposeY = titleY + titleBlockHeight + 8;
        const purposeBlockHeight = purposeLines.length * 14;
        const dividerY = purposeY + purposeBlockHeight + 12;
        const metaY = dividerY + 18;
        const lineY = metaY + 16 + Math.max(0, sourceDirLines.length - 1) * 12;
        const tagW = tagWidth(card.learning_tag || "");

        return {
          titleLines,
          purposeLines,
          sourceDirLines,
          titleY,
          purposeY,
          dividerY,
          metaY,
          lineY,
          tagW
        };
      }

      function drawMetaRow(x, y, label, lines, fontSize) {
        addText(svg, [label], x, y, {
          "font-size": "10.5",
          "font-weight": "600",
          fill: "#8a877f",
          "font-family": "Segoe UI, Microsoft YaHei UI, sans-serif"
        }, 12);

        addText(svg, lines, x + 38, y, {
          "font-size": String(fontSize),
          fill: "#666962",
          "font-family": "Segoe UI, Microsoft YaHei UI, sans-serif"
        }, 12);
      }

      const defs = svgEl("defs");
      const arrow = svgEl("marker", {
        id: "arrowHead",
        markerWidth: "10",
        markerHeight: "10",
        refX: "8",
        refY: "5",
        orient: "auto",
        markerUnits: "strokeWidth"
      });
      arrow.appendChild(svgEl("path", {
        d: "M 0 0 L 10 5 L 0 10 z",
        fill: "#bca986"
      }));
      defs.appendChild(arrow);
      svg.appendChild(defs);

      svg.appendChild(svgEl("rect", {
        x: 0,
        y: 0,
        width: model.width,
        height: model.height,
        rx: 22,
        ry: 22,
        fill: "#fffdfa",
        stroke: "#ece4d8",
        "stroke-width": "1.2"
      }));

      svg.appendChild(svgEl("line", {
        x1: 60,
        y1: 190,
        x2: model.width - 70,
        y2: 190,
        stroke: "#e0d7ca",
        "stroke-width": "1.2",
        "stroke-dasharray": "5 7"
      }));

      addText(svg, ["阶段层"], 60, 176, {
        "font-size": "12",
        fill: "#7b7f78",
        "font-family": "Segoe UI, Microsoft YaHei UI, sans-serif"
      }, 14);

      addText(svg, ["动作层"], 60, 206, {
        "font-size": "12",
        fill: "#7b7f78",
        "font-family": "Segoe UI, Microsoft YaHei UI, sans-serif"
      }, 14);

      model.phases.forEach((phase) => {
        svg.appendChild(svgEl("rect", {
          x: phase.x,
          y: phase.y,
          width: phase.w,
          height: phase.h,
          rx: 12,
          ry: 12,
          fill: phase.final ? "#fff8ea" : "#fffefd",
          stroke: phase.final ? "#bea26a" : "#d9d1c4",
          "stroke-width": phase.final ? "1.8" : "1.35"
        }));

        addText(svg, [phase.title], phase.x + phase.w / 2, phase.y + 31, {
          "text-anchor": "middle",
          "font-size": "21",
          "font-weight": "600",
          fill: "#2f312d",
          "font-family": "Segoe UI, Microsoft YaHei UI, sans-serif"
        }, 24);

        addText(svg, wrapTextKeepTokens(phase.subtitle, 18), phase.x + phase.w / 2, phase.y + 58, {
          "text-anchor": "middle",
          "font-size": "12.5",
          fill: "#7a7d77",
          "font-family": "Segoe UI, Microsoft YaHei UI, sans-serif"
        }, 16);
      });

      model.phaseLinks.forEach((link) => {
        svg.appendChild(svgEl("path", {
          d: link.path,
          fill: "none",
          stroke: "#bca986",
          "stroke-width": "1.8",
          "marker-end": "url(#arrowHead)"
        }));
      });

      model.cards.forEach((card) => {
        const cardFill = card.isSkillSource ? "#f4ede3" : "#fffdfa";
        const cardStroke = card.isSkillSource ? "#c7b293" : "#ddd5c8";
        const badgeFill = card.isSkillSource ? "#ead8bc" : (card.final ? "#f8edd3" : "#f7f2ea");
        const badgeStroke = card.final ? "#ccb27a" : cardStroke;
        const badgeText = card.isSkillSource ? "#5f4821" : "#6c5b3d";
        const titleFill = card.isSkillSource ? "#2b2a27" : "#343631";
        const tagFill = card.isSkillSource ? "#e7d8bf" : "#f2ede5";
        const tagText = card.isSkillSource ? "#6b5228" : "#7a7367";
        const layout = cardLayout(card);

        svg.appendChild(svgEl("rect", {
          x: card.x,
          y: card.y,
          width: card.w,
          height: card.h,
          rx: 12,
          ry: 12,
          fill: cardFill,
          stroke: cardStroke,
          "stroke-width": "1.2"
        }));

        svg.appendChild(svgEl("rect", {
          x: card.x + 16,
          y: card.y + 14,
          width: 34,
          height: 22,
          rx: 11,
          ry: 11,
          fill: badgeFill,
          stroke: badgeStroke,
          "stroke-width": "1"
        }));

        addText(svg, [card.id], card.x + 33, card.y + 29, {
          "text-anchor": "middle",
          "font-size": "12",
          "font-weight": "700",
          fill: badgeText,
          "font-family": "Segoe UI, Microsoft YaHei UI, sans-serif"
        }, 14);

        if (card.learning_tag) {
          const tagX = card.x + card.w - 16 - layout.tagW;
          svg.appendChild(svgEl("rect", {
            x: tagX,
            y: card.y + 14,
            width: layout.tagW,
            height: 22,
            rx: 11,
            ry: 11,
            fill: tagFill,
            stroke: cardStroke,
            "stroke-width": "1"
          }));

          addText(svg, [card.learning_tag], tagX + layout.tagW / 2, card.y + 29, {
            "text-anchor": "middle",
            "font-size": "11",
            "font-weight": "600",
            fill: tagText,
            "font-family": "Segoe UI, Microsoft YaHei UI, sans-serif"
          }, 14);
        }

        addText(svg, layout.titleLines, card.x + card.w / 2, layout.titleY, {
          "text-anchor": "middle",
          "font-size": layout.titleLines.length > 1 ? "15" : "16",
          "font-weight": "600",
          fill: titleFill,
          "font-family": "Segoe UI, Microsoft YaHei UI, sans-serif"
        }, 20);

        if (layout.purposeLines.length) {
          addText(svg, layout.purposeLines, card.x + card.w / 2, layout.purposeY, {
            "text-anchor": "middle",
            "font-size": "11.5",
            fill: "#756f64",
            "font-family": "Segoe UI, Microsoft YaHei UI, sans-serif"
          }, 14);
        }

        svg.appendChild(svgEl("line", {
          x1: card.x + 16,
          y1: layout.dividerY,
          x2: card.x + card.w - 16,
          y2: layout.dividerY,
          stroke: "#ece4d8",
          "stroke-width": "1"
        }));

        drawMetaRow(card.x + 18, layout.metaY, "目录", layout.sourceDirLines, 10.5);
        drawMetaRow(card.x + 18, layout.lineY, "行号", [card.source_line], 9.8);
      });

      model.links.forEach((link) => {
        svg.appendChild(svgEl("path", {
          d: link.path,
          fill: "none",
          stroke: "#bca986",
          "stroke-width": "1.55",
          "marker-end": "url(#arrowHead)"
        }));
      });
    })();
  </script>
</body>
</html>
